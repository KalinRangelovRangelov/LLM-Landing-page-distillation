<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentagon Clothing Supplier</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <section class="hero" id="home">
        <h1>Welcome to Pentagon Clothing</h1>
        <p>Discover the best pentagon clothing supplier.</p>
        <button class="cta">Shop Now</button>
    </section>
    <section class="products" id="products">
        <h2>Our Products</h2>
        <!-- Add product cards here -->
    </section>
    <section class="about" id="about">
        <h2>About Us</h2>
        <p>Learn more about our pentagon clothing supplier.</p>
        <img src="about.jpg" alt="About Image">
    </section>
    <section class="contact" id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" name="name" placeholder="Your Name">
            <input type="email" name="email" placeholder="Email">
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer class="footer">
        <p>&copy; 2023 Pentagon Clothing Supplier. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
