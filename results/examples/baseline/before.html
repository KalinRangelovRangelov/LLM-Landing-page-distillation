<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pentagon Clothing Supplier</title>
    <style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
}

.header {
    background-color: #333;
    color: white;
    padding: 20px 0;
    text-align: center;
}

.navbar {
    display: flex;
    justify-content: space-around;
    padding: 0;
}

.navbar a {
    color: white;
    text-decoration: none;
    padding: 10px 20px;
}

.hero {
    background-image: url('hero.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 200px;
}

.hero h1 {
    font-size: 3em;
}

.cta {
    background-color: #007BFF;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
}

.footer {
    background-color: #333;
    color: white;
    padding: 20px 0;
    text-align: center;
}
    </style>
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <section class="hero" id="home">
        <h1>Welcome to Pentagon Clothing</h1>
        <p>Discover the best pentagon clothing supplier.</p>
        <button class="cta">Shop Now</button>
    </section>
    <section class="products" id="products">
        <h2>Our Products</h2>
        <!-- Add product cards here -->
    </section>
    <section class="about" id="about">
        <h2>About Us</h2>
        <p>Learn more about our pentagon clothing supplier.</p>
        <img src="about.jpg" alt="About Image">
    </section>
    <section class="contact" id="contact">
        <h2>Contact Us</h2>
        <form>
            <input type="text" name="name" placeholder="Your Name">
            <input type="email" name="email" placeholder="Email">
            <textarea name="message" placeholder="Message"></textarea>
            <button type="submit">Send</button>
        </form>
    </section>
    <footer class="footer">
        <p>&copy; 2023 Pentagon Clothing Supplier. All rights reserved.</p>
    </footer>
    <script>
document.getElementById('contact-form').addEventListener('submit', function(event) {
    event.preventDefault();
    alert('Thank you for contacting us!');
});
    </script>
</body>
</html>
